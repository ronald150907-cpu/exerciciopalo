<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>triangulo</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: white;
      padding: 28px;
      border-radius: 10px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 20px;
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 4px;
    }

    input {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 16px;
    }

    button {
      padding: 10px 20px;
      background: #222;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover { background: #444; }

    #resultado {
      margin-top: 20px;
      font-size: 15px;
      line-height: 1.8;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Encontre o Triangulo</h1>

  <label>Lado X</label>
  <input type="number" id="x" placeholder="digite aqui">

  <label>Lado Y</label>
  <input type="number" id="y" placeholder="digite aqui">

  <label>Lado Z</label>
  <input type="number" id="z" placeholder="digite aqui">

  <br>
  <button onclick="calcTriangulo()">Verificar</button>

  <div id="resultado"></div>
</div>

<script src="script.js"></script>
</body>
</html>
