<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lanchonete</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: white;
      padding: 28px;
      border-radius: 10px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 20px;
      margin-bottom: 8px;
    }

    .cardapio {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-bottom: 24px;
      margin-top: 12px;
    }

    .cardapio th {
      background: #222;
      color: white;
      padding: 8px 10px;
      text-align: left;
    }

    .cardapio td {
      padding: 7px 10px;
      border-bottom: 1px solid #eee;
    }

    .cardapio tr:last-child td {
      border-bottom: none;
    }

    label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 4px;
    }

    input {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 16px;
    }

    button {
      padding: 10px 20px;
      background: #222;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover { background: #444; }

    #resultado {
      margin-top: 20px;
      font-size: 15px;
      line-height: 1.8;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Lanchonete</h1>

  <table class="cardapio">
    <tr>
      <th>Codigo</th>
      <th>Produto</th>
      <th>Preco</th>
    </tr>
    <tr><td>1</td><td>Cachorro Quente</td><td>R$ 11,00</td></tr>
    <tr><td>2</td><td>Baru</td><td>R$ 8,50</td></tr>
    <tr></tr><td>3</td><td>Misto Quente</td><td>R$ 8,00</td></tr>
    <tr><td>4</td><td>Hamburger</td><td>R$ 9,00</td></tr>
    <tr><td>5</td><td>Cheeseburger</td><td>R$ 10,00</td></tr>
    <tr><td>6</td><td>Refrigerante</td><td>R$ 4,50</td></tr>
  <table>

  <label>Codigo do itm</label>
  <input type="number" id="codigo" placeholder="ex: 1">

  <label>Quantidade</label>
  <input type="number" id="quantidade" placeholder="ex: 2">

  <button onclick="calcPedido()">Calcular</button>

  <div id="resultado"></div>
</div>

<script src="script.js"></script>
</body>
</html>
